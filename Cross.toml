# Cross.toml — configuration for https://github.com/cross-rs/cross
#
# For each target, we run `pre-build` commands inside the cross Docker image
# to install SDL2 and DRM dev libraries for the target architecture. The
# images are Debian-based and already have the foreign architecture added,
# so a plain `apt-get install` works without the ports.ubuntu.com version-skew
# issues that bite direct cross-compilation on the host.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes --no-install-recommends \
        libsdl2-dev:$CROSS_DEB_ARCH \
        libdrm-dev:$CROSS_DEB_ARCH \
        libgbm-dev:$CROSS_DEB_ARCH \
        libudev-dev:$CROSS_DEB_ARCH \
        pkg-config",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes --no-install-recommends \
        libsdl2-dev:$CROSS_DEB_ARCH \
        libdrm-dev:$CROSS_DEB_ARCH \
        libgbm-dev:$CROSS_DEB_ARCH \
        libudev-dev:$CROSS_DEB_ARCH \
        pkg-config",
]

# Environment variables pkg-config needs inside the image so it finds the
# arch-specific .pc files (and is allowed to report cross-arch paths).
[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig",
]
