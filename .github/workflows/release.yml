# ============================================================
# PicoGallery — Build & Release for Raspberry Pi
# ============================================================
# Triggers:
#   - Push a tag like v0.1.0  → full release with GitHub Release
#   - Push to main            → build-only (artifact upload, no release)
#   - Manual dispatch         → choose whether to create a release
#
# Cross-compilation strategy:
#   Uses `cross` (https://github.com/cross-rs/cross) with a custom Docker
#   image per target so libsdl2-dev / libdrm-dev / glib version-skew
#   between ports.ubuntu.com and the main Ubuntu archive are avoided
#   entirely. Direct cross-compilation via dpkg --add-architecture hits
#   unmet-dependency errors because ports.ubuntu.com and the main mirrors
#   drift out of sync.
#
# Targets:
#   - aarch64-unknown-linux-gnu     (Pi Zero 2 W, Pi 3/4/5 64-bit)
#   - armv7-unknown-linux-gnueabihf (Pi 2, Pi 3/4 32-bit OS)
# ============================================================

name: Build & Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            strip: aarch64-linux-gnu-strip

          - target: armv7-unknown-linux-gnueabihf
            arch: armv7
            strip: arm-linux-gnueabihf-strip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: |
          # Pinned version — 'cross' releases occasionally break target images.
          cargo install cross --version 0.2.5 --locked

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cross-

      - name: Build release binary
        run: |
          # Cross.toml tells cross which Docker image to use per target,
          # and pre-installs libsdl2-dev / libdrm-dev / libgbm-dev / libudev-dev
          # for that arch inside the image.
          cross build \
            --release \
            --target ${{ matrix.target }} \
            --features "plugin-google-photos,plugin-local,plugin-directory"

      - name: Prepare artifact
        run: |
          BINARY="target/${{ matrix.target }}/release/picogallery"
          VERSION="${GITHUB_REF_NAME:-dev}"

          # Install the cross binutils so we can strip the ARM binary.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
          if command -v "${{ matrix.strip }}" &>/dev/null; then
            "${{ matrix.strip }}" "$BINARY" 2>/dev/null || true
          fi

          ARTIFACT_NAME="picogallery-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "dist/${ARTIFACT_NAME}"

          cp "$BINARY"              "dist/${ARTIFACT_NAME}/picogallery"
          cp -r sample_photos       "dist/${ARTIFACT_NAME}/" 2>/dev/null || true
          cp picogallery.service    "dist/${ARTIFACT_NAME}/"
          cp config.example.toml    "dist/${ARTIFACT_NAME}/"
          cp install.sh             "dist/${ARTIFACT_NAME}/" 2>/dev/null || true
          cp LICENSE                "dist/${ARTIFACT_NAME}/" 2>/dev/null || true
          cp README.md              "dist/${ARTIFACT_NAME}/" 2>/dev/null || true

          cd dist
          tar czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"
          sha256sum "${ARTIFACT_NAME}.tar.gz" > "${ARTIFACT_NAME}.tar.gz.sha256"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=dist/${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_ENV"

          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target:** ${{ matrix.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Binary size:** $(du -h ../${BINARY} | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Archive:** ${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.tar.gz" -exec cp {} release-files/ \;
          find artifacts -name "*.sha256" -exec cp {} release-files/ \;

          echo "### Release Files" >> "$GITHUB_STEP_SUMMARY"
          ls -lh release-files/ >> "$GITHUB_STEP_SUMMARY"

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: release-files/*
          body: |
            ## Installation

            **One-line install on your Raspberry Pi:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            Or download the archive for your architecture below and extract manually.

            ### Supported Platforms
            | Archive | Architecture | Devices |
            |---------|-------------|---------|
            | `*-linux-aarch64.tar.gz` | 64-bit ARM | Pi Zero 2 W, Pi 3/4/5 (64-bit OS) |
            | `*-linux-armv7.tar.gz` | 32-bit ARM | Pi 2, Pi 3/4 (32-bit OS) |
