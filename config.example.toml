# PicoGallery — example configuration
# Copy this file to  ~/.config/picogallery/config.toml  and edit it.
# Or run:  picogallery --generate-config
#
# QUICK START
# -----------
# 1. Copy this file:
#      cp config.example.toml ~/.config/picogallery/config.toml
# 2. Edit the file and set  enabled = true  on one plugin.
# 3. Fill in the required fields for that plugin.
# 4. Run:  picogallery

# ─────────────────────────────────────────────────────────────────────────────
# Display
# ─────────────────────────────────────────────────────────────────────────────
[display]
slide_duration_secs = 10      # seconds each photo is shown
transition          = "fade"  # "cut" | "fade" | "slide_left" | "slide_right"
transition_ms       = 800     # transition duration (ms); set 0 to disable
fill_screen         = false   # true = crop-to-fill; false = letterbox (black bars)
fps                 = 15      # frame-rate cap — lower saves CPU on Pi Zero
# width  = 1920
# height = 1080

# ── Photo ordering ────────────────────────────────────────────────────────────
#
# Controls the order photos are presented.
#   "shuffle"        — random order, reshuffled each startup (default)
#   "chronological"  — oldest photo first, sorted by EXIF capture date
#   "newest_first"   — newest photo first, sorted by EXIF capture date
#
# Photos without a capture date are sorted to the end for the date-based modes.
#
# order = "shuffle"

# ── Metadata overlay (OSD) ────────────────────────────────────────────────────
#
# Shows a subtle info pill in the bottom-left corner of each photo containing
# the album name, capture date (from EXIF), and filename.  White text on a
# darkened background — readable against any photo.
#
# Set to false to show photos without any overlay.
#
# show_osd = true

# ── Display schedule (optional, both fields required to activate) ─────────────
#
# Times are in 24-hour HH:MM format, interpreted in local time.
# When active, the display turns on at on_time and off at off_time each day.
# Between off_time and on_time the screen shows black and HDMI power is cut
# (via vcgencmd display_power on Raspberry Pi; black-frame only on other Linux).
#
# Leave both commented out (default) to keep the display on at all times.
#
# on_time  = "07:00"   # display turns on at 07:00 each morning
# off_time = "22:00"   # display turns off at 22:00 each evening

# ─────────────────────────────────────────────────────────────────────────────
# Cache
# ─────────────────────────────────────────────────────────────────────────────
[cache]
max_mb         = 256   # on-disk cache ceiling in MB
prefetch_count = 3     # photos pre-fetched while current photo is on screen
# dir = "/tmp/picogallery-cache"

# ═════════════════════════════════════════════════════════════════════════════
# Plugins — enable one or more by setting  enabled = true
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# [PLUGIN] directory  ★ easiest to get started
# Serve photos from a single root directory.
# Sub-directories are treated as albums (like Google Photos albums).
# ─────────────────────────────────────────────────────────────────────────────
[[plugins]]
name    = "directory"
enabled = true                     # ← enabled by default

path      = "~/Pictures/PicoGallery"         # root directory (required; `~` expands to $HOME)
order     = "shuffle"              # "shuffle" | "alphabetical" | "date_modified"
recursive = true                   # include sub-directories

# Limit to specific sub-directories (albums). Remove or leave empty for all.
# allowed_albums = ["Vacation 2024", "Birthday 2023"]

# Re-scan the directory every hour (0 = only at startup)
# rescan_interval_secs = 3600

# ─────────────────────────────────────────────────────────────────────────────
# [PLUGIN] local
# Like "directory" but accepts multiple root paths.
# (Requires the binary to be built with `plugin-local` — the default Raspberry Pi
#  install only compiles `plugin-directory` to keep build time low.)
# ─────────────────────────────────────────────────────────────────────────────
[[plugins]]
name    = "local"
enabled = false

paths     = ["~/Pictures/PicoGallery"]   # `~` expands to $HOME
recursive = true

# ─────────────────────────────────────────────────────────────────────────────
# [PLUGIN] google-photos  (requires rclone — sudo apt install rclone)
# Uses Google Drive as the photo source (Google Photos Library API was removed
# on March 31, 2025; Drive API via rclone is the recommended alternative).
#
# First run: picogallery will open a browser sign-in page.
# Subsequent runs: the saved token is reused automatically.
# ─────────────────────────────────────────────────────────────────────────────
[[plugins]]
name    = "google-photos"
enabled = false

sync_dir = "/tmp/picogallery-gdrive"   # local cache for synced photos
# drive_folder_id = ""                 # optional: Drive folder ID to sync from
# max_transfer    = "500"              # MB cap per sync run

# ─────────────────────────────────────────────────────────────────────────────
# [PLUGIN] amazon-photos
# Requires a Login with Amazon (LWA) app — see developer.amazon.com
# ─────────────────────────────────────────────────────────────────────────────
[[plugins]]
name    = "amazon-photos"
enabled = false

client_id     = "YOUR_LWA_CLIENT_ID"
client_secret = "YOUR_LWA_CLIENT_SECRET"

# ─────────────────────────────────────────────────────────────────────────────
# [PLUGIN] webdav  ★ Nextcloud / ownCloud / Synology NAS
#
# Syncs photos from any WebDAV server to a local cache and serves them from
# disk.  Works offline after the first sync (equivalent to photOS's
# WebDAV-mount + rsync approach, but entirely in Rust — no shell tools).
#
# Tested with: Nextcloud, ownCloud, Synology DSM, nginx-dav-ext, Apache mod_dav
#
# SETUP (Nextcloud example)
# 1. Find your WebDAV URL in Nextcloud → Files → "…" menu → WebDAV.
#    It looks like: https://cloud.example.com/remote.php/dav/files/USERNAME
# 2. Set your username and password (or an app-password from Security settings).
# 3. Set remote_path to the folder you want to sync (e.g. "/Photos").
# 4. Set enabled = true and restart picogallery.
# ─────────────────────────────────────────────────────────────────────────────
[[plugins]]
name    = "webdav"
enabled = false

# Full URL of the WebDAV endpoint (required).
# Nextcloud: https://cloud.example.com/remote.php/dav/files/YOUR_USERNAME
# Synology:  https://nas.example.com:5006/photo
# ownCloud:  https://cloud.example.com/remote.php/webdav
url      = "https://cloud.example.com/remote.php/dav/files/YOUR_USERNAME"

username = "your-username"
password = "your-password"     # consider using an app-password for better security

# Sub-path on the server to sync (default: "/" = everything under url).
remote_path = "/Photos"

# Local directory where synced photos are cached (created automatically).
sync_dir = "/tmp/picogallery-webdav"

# Re-sync every N seconds in the background; 0 = startup sync only (default: 3600).
sync_interval_secs = 3600

# Set to true to accept self-signed TLS certificates (e.g. a local NAS).
# skip_tls_verify = false
